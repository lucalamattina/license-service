name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

# Cancel in-progress runs for the same branch/PR when a new commit lands.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci
      - run: npm run lint

  typecheck:
    name: typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci
      - run: npm run typecheck

  unit-tests:
    name: unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci
      - run: npm run test:unit

  integration-tests:
    name: integration tests
    runs-on: ubuntu-latest

    # Postgres and Redis run as GitHub Actions service containers on default ports.
    # Their healthchecks gate the job: tests only run once both are ready.
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: license_service
          POSTGRES_PASSWORD: license_service
          POSTGRES_DB: license_service
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U license_service"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      # CI uses default ports — no host-installed Postgres/Redis to clash with.
      TEST_DATABASE_URL: postgres://license_service:license_service@localhost:5432/license_service_test
      TEST_REDIS_URL: redis://localhost:6379

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - run: npm ci

      # Explicit: create the test database (if missing) and apply migrations
      # before the test runner starts. Tests can assume a clean, migrated schema.
      - name: apply migrations to test database
        run: npm run db:migrate:test

      - run: npm run test:integration

  build:
    name: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci
      - run: npm run build

  docker-build:
    name: docker build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: license-service:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Publishes the image to GHCR only on green main — gated on every check job
  # above passing. PRs never reach here (the `if` requires a push to main), so
  # forks/PRs can't publish and no registry credentials are exposed to them.
  publish:
    name: publish image
    runs-on: ubuntu-latest
    needs: [lint, typecheck, unit-tests, integration-tests, build, docker-build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write # required to push to ghcr.io
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: image tags + labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha
            type=raw,value=latest
      - name: build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

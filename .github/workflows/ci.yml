name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

# Cancel in-progress runs for the same branch/PR when a new commit lands.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci
      - run: npm run lint

  typecheck:
    name: typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci
      - run: npm run typecheck

  unit-tests:
    name: unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci
      - run: npm run test:unit

  integration-tests:
    name: integration tests
    runs-on: ubuntu-latest

    # Postgres and Redis run as GitHub Actions service containers on default ports.
    # Their healthchecks gate the job: tests only run once both are ready.
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: license_service
          POSTGRES_PASSWORD: license_service
          POSTGRES_DB: license_service
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U license_service"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      # CI uses default ports — no host-installed Postgres/Redis to clash with.
      TEST_DATABASE_URL: postgres://license_service:license_service@localhost:5432/license_service_test
      TEST_REDIS_URL: redis://localhost:6379

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - run: npm ci

      # Explicit: create the test database (if missing) and apply migrations
      # before the test runner starts. Tests can assume a clean, migrated schema.
      - name: apply migrations to test database
        run: npm run db:migrate:test

      - run: npm run test:integration

  build:
    name: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci
      - run: npm run build

  docker-build:
    name: docker build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: license-service:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Publishes the image to GHCR only on green main — gated on every check job
  # above passing. PRs never reach here (the `if` requires a push to main), so
  # forks/PRs can't publish and no registry credentials are exposed to them.
  publish:
    name: publish image
    runs-on: ubuntu-latest
    needs: [lint, typecheck, unit-tests, integration-tests, build, docker-build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write # write: also commit the pinned image tag back to k8s/
      packages: write # required to push to ghcr.io
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      # Compute the short-sha tag once and reuse it for both the push and the
      # manifest write-back, so the published tag and the pinned tag can't drift.
      - name: compute image ref
        id: img
        run: |
          SHORT=$(git rev-parse --short=7 HEAD)
          echo "tag=sha-$SHORT" >> "$GITHUB_OUTPUT"
          echo "ref=ghcr.io/${{ github.repository }}:sha-$SHORT" >> "$GITHUB_OUTPUT"
      - name: build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.img.outputs.ref }}
            ghcr.io/${{ github.repository }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
      # GitOps write-back: pin the freshly-built immutable SHA tag into the
      # Deployments and commit it. [skip ci] stops this commit from re-triggering
      # the workflow. ArgoCD then syncs the change and rolls the pods.
      - name: pin image tag in manifests
        run: |
          REF="${{ steps.img.outputs.ref }}"
          sed -i -E "s|image: ghcr.io/${{ github.repository }}:.*|image: $REF|" \
            k8s/deployment-web.yaml k8s/deployment-worker.yaml
          if git diff --quiet -- k8s/; then
            echo "manifests already pinned to $REF — nothing to commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add k8s/deployment-web.yaml k8s/deployment-worker.yaml
          git commit -m "deploy ${{ steps.img.outputs.tag }} [skip ci]"
          git push origin HEAD:main

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: lint + typecheck + test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: license_service
          POSTGRES_PASSWORD: license_service
          POSTGRES_DB: license_service
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U license_service"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      # CI uses default ports — no host clash like local dev has.
      DATABASE_URL: postgres://license_service:license_service@localhost:5432/license_service
      TEST_DATABASE_URL: postgres://license_service:license_service@localhost:5432/license_service_test
      REDIS_URL: redis://localhost:6379
      TEST_REDIS_URL: redis://localhost:6379

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - run: npm ci

      - run: npm run lint

      - run: npm run typecheck

      - run: npm test

      - run: npm run build

  docker-build:
    name: docker build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: license-service:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

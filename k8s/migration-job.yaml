apiVersion: batch/v1
kind: Job
metadata:
  name: license-service-migrate
  annotations:
    # Run as an ArgoCD PreSync hook: migrations apply once, before the web/worker
    # Deployments are synced, on every rollout. Because ArgoCD deletes + recreates
    # the hook each sync, the "Job spec is immutable" conflict never arises.
    argocd.argoproj.io/hook: PreSync
    # Delete the previous hook Job just before creating the next one — leaves the
    # last run around between syncs so its logs are inspectable.
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  backoffLimit: 3
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: migrate
          image: ghcr.io/lucalamattina/license-service:sha-50d2979
          imagePullPolicy: IfNotPresent
          command: ["node", "dist/db/migrate-cli.js"]
          envFrom:
            - configMapRef: { name: license-service-config }
            - secretRef: { name: license-service-secrets }

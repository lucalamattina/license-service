apiVersion: batch/v1
kind: Job
metadata:
  name: license-service-migrate
  annotations:
    # Run as an ArgoCD PreSync hook: migrations apply once, before the web/worker
    # Deployments are synced, on every rollout. Because ArgoCD deletes + recreates
    # the hook each sync, the "Job spec is immutable" conflict never arises.
    argocd.argoproj.io/hook: PreSync
    # Delete the previous hook Job just before creating the next one — leaves the
    # last run around between syncs so its logs are inspectable.
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  backoffLimit: 3
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: migrate
          image: ghcr.io/lucalamattina/license-service:sha-acbb96d
          imagePullPolicy: IfNotPresent
          command: ["node", "dist/db/migrate-cli.js"]
          # Self-contained: a PreSync hook runs BEFORE the Sync phase that creates
          # the ConfigMap, so it must NOT depend on license-service-config (doing so
          # deadlocks the first sync on a fresh cluster with CreateContainerConfigError).
          # The migration only needs DATABASE_URL (from the Secret, provisioned ahead
          # of ArgoCD by Terraform) and DATABASE_SSL (false for in-cluster Postgres).
          env:
            - { name: DATABASE_SSL, value: "false" }
          envFrom:
            - secretRef: { name: license-service-secrets }

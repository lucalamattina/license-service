apiVersion: v1
kind: Service
metadata:
  name: license-service
  labels: { app: license-service, role: web }   # selected by the web ServiceMonitor
spec:
  type: ClusterIP
  selector: { app: license-service, role: web }   # web pods only
  ports:
    - name: http   # named so the ServiceMonitor can reference it by name
      port: 3000
      targetPort: 3000

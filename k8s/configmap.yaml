apiVersion: v1
kind: ConfigMap
metadata:
  name: license-service-config
data:
  NODE_ENV: "production"
  RUN_MIGRATIONS_ON_BOOT: "false"   # the Job owns migrations; see migration-job.yaml
  DATABASE_SSL: "false"             # in-cluster PG, no self-signed cert
  CORS_ALLOWED_ORIGINS: "https://license-service-dashboard.vercel.app,https://license-service-dashboard-*.vercel.app"

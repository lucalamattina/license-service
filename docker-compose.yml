services:
  postgres:
    image: postgres:16-alpine
    container_name: license-service-postgres
    environment:
      POSTGRES_USER: license_service
      POSTGRES_PASSWORD: license_service
      POSTGRES_DB: license_service
    ports:
      - '5433:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U license_service -d license_service']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: license-service-redis
    ports:
      - '6380:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  postgres-data:

services:
  postgres:
    image: postgres:16-alpine
    container_name: license-service-postgres
    environment:
      POSTGRES_USER: license_service
      POSTGRES_PASSWORD: license_service
      POSTGRES_DB: license_service
    ports:
      - '5433:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U license_service -d license_service']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: license-service-redis
    ports:
      - '6380:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build: .
    container_name: license-service-app
    profiles: ['full-stack']
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://license_service:license_service@postgres:5432/license_service
      REDIS_URL: redis://redis:6379
      RUN_MIGRATIONS_ON_BOOT: 'true'
      LOG_LEVEL: info
    ports:
      - '3000:3000'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres-data:
